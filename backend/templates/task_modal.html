<dialog id="taskModal" class="modal">
  <form method="dialog" class="modal-card" id="taskForm">
    <div class="panel-head"><h2 id="taskModalTitle">Task</h2><button type="button" class="icon-btn" onclick="document.getElementById('taskModal').close()">×</button></div>
    <input type="hidden" name="id">
    <label>Title<input name="title" required></label>
    <label>Description<textarea name="description" rows="3"></textarea></label>
    <div class="two-col">
      <label>Project<select name="project_id" required></select></label>
      <label>Assignee<select name="assigned_to"></select></label>
      <label>Status<select name="status"><option>Pending</option><option>In Progress</option><option>Review</option><option>Completed</option></select></label>
      <label>Priority<select name="priority"><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select></label>
      <label>Type<select name="task_type"><option>Bug</option><option>Feature</option><option>Improvement</option><option>Documentation</option><option>Research</option></select></label>
      <label>Due date<input type="date" name="due_date"></label>
    </div>
    <div class="modal-actions"><button type="button" class="ghost-btn" onclick="document.getElementById('taskModal').close()">Cancel</button><button class="primary-btn">Save task</button></div>
  </form>
</dialog>
