<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TaskPilot{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  {% block styles %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <a class="brand" href="/dashboard"><span class="brand-mark"><img src="/static/images/log01.png" alt="TaskPilot" style="height:1.7em;width:1.7em;object-fit:contain;border-radius:6px;display:block;"></span><span>TaskPilot</span></a>
      <nav class="nav-list">
        <a href="/dashboard" data-nav="dashboard">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="/projects-view" data-nav="projects">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          Projects
        </a>
        <a href="/tasks-view" data-nav="tasks">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Tasks
        </a>
        <a href="/users-view" data-nav="users" data-admin-only>
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          Users
        </a>
        <a href="/profile" data-nav="profile">
          <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
      </nav>
      <div class="sidebar-card">
        <span class="eyebrow">Workspace</span>
        <strong id="sidebarUser">Loading...</strong>
        <small id="sidebarRole">Checking session</small>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <button class="icon-btn" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
        <div>
          <span class="eyebrow">{% block eyebrow %}Workspace{% endblock %}</span>
          <h1>{% block page_title %}TaskPilot{% endblock %}</h1>
        </div>
        <div class="topbar-actions">
          <div class="search-shell">
            <span>⌕</span>
            <input id="globalSearch" type="search" placeholder="Search tasks">
          </div>
          <button class="ghost-btn" id="logoutBtn">Logout</button>
        </div>
      </header>
      <section class="content">
        {% block content %}{% endblock %}
      </section>
    </main>
  </div>
  <div id="toastHost" class="toast-host"></div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
